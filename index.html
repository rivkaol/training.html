<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="page-title">טוען הדרכה...</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;700;900&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1B4D3E',      /* ירוק מותג */
                        accent: '#D4AF37',       /* זהב */
                        bgCream: '#FDFBF7',      /* שמנת */
                    },
                    fontFamily: { sans: ['Rubik', 'sans-serif'] }
                }
            }
        }
    </script>

    <style>
        :root { --secondary-color: #D68C85; }
        html, body {
            max-width: 100%; overflow-x: hidden;
            background-color: var(--bg-cream); color: #333;
            scroll-behavior: smooth; touch-action: manipulation;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.96); backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 20px 50px rgba(27, 77, 62, 0.05);
        }
        .custom-input { transition: all 0.2s ease; border: 1.5px solid #E2E8F0; background: #fff !important; }
        .custom-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.1); }
        .custom-input.error { border-color: #ef4444; background-color: #fffafb !important; }
        .hp-field { display: none !important; opacity: 0; position: absolute; }
        #loader {
            position: fixed; inset: 0; background: #fff; z-index: 100;
            display: flex; align-items: center; justify-content: center;
        }
        .main-content { opacity: 0; transition: opacity 0.8s ease; }
        .is-loaded .main-content { opacity: 1; }
        .btn-premium {
            background: linear-gradient(135deg, #D4AF37 0%, #C5A028 100%);
            box-shadow: 0 10px 25px rgba(212, 175, 55, 0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body class="antialiased text-[22px] md:text-[24px]">

    <div id="loader">
        <div class="flex flex-col items-center gap-4">
            <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-primary"></div>
            <p class="text-primary font-medium text-lg">מעדכנת פרטים מהטבלה...</p>
        </div>
    </div>

    <div id="wrapper" class="main-content">
        <header class="relative pt-16 pb-20 md:pt-28 md:pb-36 px-6 bg-gradient-to-b from-white to-bgCream">
            <div class="max-w-5xl mx-auto text-center">
                <div class="inline-flex items-center gap-2 px-6 py-2 rounded-full bg-white border border-gray-100 text-primary font-bold text-base md:text-lg mb-10 shadow-sm">
                    <i data-lucide="sparkles" class="w-5 h-5 text-accent"></i>
                    הדרכת עומק בשידור חי
                </div>
                <h1 id="training-name" class="text-5xl md:text-8xl font-black text-primary mb-8 leading-[1.1] tracking-tight">...</h1>
                <p id="training-date-hero" class="text-2xl md:text-4xl text-gray-500 mb-16 font-light max-w-3xl mx-auto">...</p>

                <div class="max-w-xl mx-auto">
                    <div class="glass-card p-10 md:p-14 rounded-[45px] text-right">
                        <h3 class="text-3xl font-bold text-center mb-10 text-primary">שמרי לי מקום</h3>
                        <form class="dynamic-form space-y-6" onsubmit="processForm(event)">
                            <div class="hp-field"><input type="text" name="hp_confirm"></div>
                            <input type="text" name="fullName" class="custom-input w-full px-6 py-5 rounded-2xl text-xl" placeholder="שם מלא" required>
                            <input type="email" name="email" class="custom-input w-full px-6 py-5 rounded-2xl text-xl text-left" dir="ltr" placeholder="אימייל" required>
                            <input type="tel" name="phone" class="custom-input w-full px-6 py-5 rounded-2xl text-xl text-left" dir="ltr" placeholder="טלפון (גם לחו״ל)" required>
                            <button type="submit" class="btn-premium w-full py-6 text-white font-black rounded-[20px] text-2xl mt-6">שרייני לי מקום עכשיו</button>
                        </form>
                    </div>
                </div>
            </div>
        </header>

        <section class="py-24 bg-white">
            <div class="max-w-6xl mx-auto px-6 grid md:grid-cols-3 gap-10">
                <div class="glass-card p-12 rounded-[40px] text-center">
                    <i data-lucide="calendar-days" class="w-10 h-10 mx-auto mb-8" style="color: var(--secondary-color)"></i>
                    <h3 class="text-2xl font-bold text-primary mb-3">מתי?</h3>
                    <p id="info-date" class="text-gray-600 font-medium">...</p>
                </div>
                <div class="glass-card p-12 rounded-[40px] text-center">
                    <i data-lucide="video" class="w-10 h-10 mx-auto mb-8" style="color: var(--secondary-color)"></i>
                    <h3 class="text-2xl font-bold text-primary mb-3">איפה?</h3>
                    <p class="text-gray-600 font-medium">בזום מהבית</p>
                </div>
                <div class="glass-card p-12 rounded-[40px] text-center">
                    <i data-lucide="clapperboard" class="w-10 h-10 mx-auto mb-8" style="color: var(--secondary-color)"></i>
                    <h3 class="text-2xl font-bold text-primary mb-3">פספסת?</h3>
                    <p class="text-gray-600 font-medium">ההקלטה תישלח אלייך</p>
                </div>
            </div>
        </section>

        <section class="py-24 px-6 bg-bgCream">
            <div class="max-w-5xl mx-auto flex flex-col md:flex-row items-center gap-16">
                <div class="w-72 h-72 md:w-96 md:h-96 rounded-full border-[12px] border-white shadow-2xl overflow-hidden shrink-0">
                    <img src="https://raw.githubusercontent.com/rivkaol/quiet-gut/main/profile.jpg.jpg" class="w-full h-full object-cover">
                </div>
                <div class="text-center md:text-right">
                    <h2 class="text-4xl font-black text-primary mb-8 underline decoration-accent/30 underline-offset-8">מילה אישית ממני</h2>
                    <p class="text-2xl text-gray-700 leading-relaxed font-light italic">
                        "הגוף שלנו הוא המרפא הטוב ביותר של עצמו - כשנותנים לו את התנאים הנכונים, גם בגוף וגם בנפש."
                    </p>
                    <p class="text-2xl font-bold mt-8 text-primary">שלך, רבקה הולצברג</p>
                </div>
            </div>
        </section>

        <section class="py-24 bg-primary text-white">
            <div class="max-w-2xl mx-auto px-6 text-center">
                <h2 class="text-4xl md:text-7xl font-black text-white mb-16">הגיע הזמן שלך</h2>
                <div class="bg-white rounded-[50px] p-10 md:p-16 text-right shadow-2xl">
                    <form class="dynamic-form space-y-6" onsubmit="processForm(event)">
                        <div class="hp-field"><input type="text" name="hp_confirm"></div>
                        <input type="text" name="fullName" class="custom-input w-full px-6 py-5 rounded-2xl text-gray-800" placeholder="שם מלא" required>
                        <input type="email" name="email" class="custom-input w-full px-6 py-5 rounded-2xl text-gray-800 text-left" dir="ltr" placeholder="אימייל" required>
                        <input type="tel" name="phone" class="custom-input w-full px-6 py-5 rounded-2xl text-gray-800 text-left" dir="ltr" placeholder="טלפון" required>
                        <button type="submit" class="btn-premium w-full py-6 text-white font-black rounded-2xl text-2xl mt-8">הרשמה ותשלום מאובטח</button>
                    </form>
                </div>
            </div>
        </section>

        <footer class="py-12 bg-white text-center">
            <script src="https://rivkaol.github.io/legal-footer.js"></script>
        </footer>
    </div>

    <script>
        let cachedData = {};
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxcBMhF24nVMMHCqI1H2WYcC1pU-TfTwwaDq0uiiRGO2husMX_7wC2mFwgXnxTPP5a3fg/exec";

        async function loadData() {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');
            if (!id) { document.body.innerHTML = "<div class='p-20 text-center'>חסר ID בכתובת</div>"; return; }

            try {
                const response = await fetch(`${SCRIPT_URL}?id=${id}`);
                cachedData = await response.json();
                document.getElementById('page-title').innerText = cachedData.name + " | רבקה הולצברג";
                document.getElementById('training-name').innerText = cachedData.name;
                document.getElementById('training-date-hero').innerText = cachedData.date;
                document.getElementById('info-date').innerText = cachedData.date;
                if(cachedData.color) document.documentElement.style.setProperty('--secondary-color', cachedData.color);
                document.body.classList.add('is-loaded');
                document.getElementById('loader').style.display = 'none';
                lucide.createIcons();
            } catch (e) { console.error(e); }
        }

        async function processForm(e) {
            e.preventDefault();
            const form = e.target;
            if(form.hp_confirm.value !== "") return; 
            
            const btn = form.querySelector('button');
            btn.innerText = "מעבד...";
            btn.disabled = true;

            const payload = {
                fullName: form.fullName.value,
                email: form.email.value,
                phone: form.phone.value,
                trainingId: new URLSearchParams(window.location.search).get('id'),
                smooveId: cachedData.smooveId || ""
            };

            try {
                await fetch('YOUR_MAKE_WEBHOOK_URL', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                window.location.href = cachedData.paymentLink;
            } catch (err) { window.location.href = cachedData.paymentLink; }
        }
        window.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
